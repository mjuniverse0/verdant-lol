# Same headers as /etc/nginx/global_settings, but no X-Frame-Options (allows embedding from horii.dev).
# Production: /etc/nginx/snippets/security_headers_horii_embed.conf
# Use in verdant.lol + mj-universe.net server blocks instead of include global_settings;
# Re-upload after editing global_settings on the server. Deploy: scp to the path above then nginx -t && systemctl reload nginx

#add_header Strict-Transport-Security 'max-age=31536000; includeSubDomains; preload';
add_header X-Content-Type-Options nosniff;
add_header X-XSS-Protection "1; mode=block";
add_header X-Permitted-Cross-Domain-Policies master-only;
add_header Referrer-Policy same-origin;
add_header alt-svc 'h3=":443"; ma=86400';
add_header Content-Security-Policy "frame-ancestors 'self' https://horii.dev" always;
