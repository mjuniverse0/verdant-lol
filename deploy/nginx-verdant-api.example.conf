# Drop-in fragment for nginx on the VPS: static site from htdocs + Node API on WEB_PORT (default 8787).
# deploy-web.ps1 only uploads web/ - without this, GET https://verdant.lol/api/executor/health hits static files and fails.
#
# Merge into your server block for verdant.lol (adjust paths and upstream port).
#
# Embedding (horii.dev portfolio iframes): production uses
#   include /etc/nginx/snippets/security_headers_horii_embed.conf;
# instead of include /etc/nginx/global_settings; so responses omit X-Frame-Options:SAMEORIGIN and send
#   Content-Security-Policy: frame-ancestors 'self' https://horii.dev
# See deploy/nginx-security-headers-horii-embed.conf (copy to the server path above).

upstream verdant_node_api {
    server 127.0.0.1:8787;
    keepalive 8;
}

server {
    listen 443 ssl http2;
    server_name verdant.lol;

    # ssl_certificate ... (your existing config)

    root /home/verdant/htdocs/verdant.lol;
    index index.html;

    # All JSON / payment / launcher / executor routes → Express (server.js)
    location /api/ {
        proxy_pass http://verdant_node_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
