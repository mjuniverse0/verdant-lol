<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Astral</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#08060E;}
#editor{width:100%;height:100%;}
</style>
</head>
<body>
<div id="editor"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
<script>
var editor;

require.config({paths:{'vs':'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs'}});
require(['vs/editor/editor.main'],function(){
  monaco.editor.defineTheme('externus',{
    base:'vs-dark',inherit:true,
    rules:[
      {token:'comment',    foreground:'4B5563',fontStyle:'italic'},
      {token:'keyword',    foreground:'A78BFA',fontStyle:'bold'},
      {token:'string',     foreground:'C4B5FD'},
      {token:'number',     foreground:'F0ABFC'},
      {token:'identifier', foreground:'E2E8F0'},
      {token:'operator',   foreground:'7C3AED'},
      {token:'delimiter',  foreground:'6B7280'},
    ],
    colors:{
      'editor.background':                    '#08060E',
      'editor.foreground':                    '#E2E8F0',
      'editorLineNumber.foreground':          '#2D2B45',
      'editorLineNumber.activeForeground':    '#8B5CF6',
      'editor.selectionBackground':           '#8B5CF630',
      'editor.inactiveSelectionBackground':   '#8B5CF615',
      'editorCursor.foreground':              '#A78BFA',
      'editor.lineHighlightBackground':       '#110F1D',
      'editorIndentGuide.background':         '#1C1830',
      'editorIndentGuide.activeBackground':   '#3D2F6A',
      'editorWidget.background':              '#0D0B17',
      'editorSuggestWidget.background':       '#0D0B17',
      'editorSuggestWidget.border':           '#1C1830',
      'editorSuggestWidget.selectedBackground':'#1A1535',
      'editorHoverWidget.background':         '#0D0B17',
      'editorHoverWidget.border':             '#1C1830',
      'scrollbarSlider.background':           '#3D2F6A40',
      'scrollbarSlider.hoverBackground':      '#8B5CF640',
      'scrollbar.shadow':                     '#00000000',
      'minimap.background':                   '#08060E',
    }
  });

  editor=monaco.editor.create(document.getElementById('editor'),{
    value:'-- Astral | Premium Executor\n\nprint("Hello from Astral!")',
    language:'lua',
    theme:'externus',
    automaticLayout:true,
    fontSize:13,
    fontFamily:"'Cascadia Code','Fira Code','Consolas',monospace",
    fontLigatures:true,
    lineHeight:21,
    minimap:{enabled:true,scale:1,renderCharacters:false},
    scrollBeyondLastLine:false,
    smoothScrolling:true,
    cursorBlinking:'smooth',
    cursorSmoothCaretAnimation:'on',
    padding:{top:12,bottom:12},
    renderLineHighlight:'all',
    bracketPairColorization:{enabled:true},
    guides:{bracketPairs:true,indentation:true},
    overviewRulerLanes:0,
    hideCursorInOverviewRuler:true,
    scrollbar:{
      vertical:'auto',
      horizontal:'auto',
      verticalScrollbarSize:5,
      horizontalScrollbarSize:5,
    },
  });
});

function GetText(){return editor?editor.getValue():'';}
function SetText(t){
  if(editor) {
    const model = editor.getModel();
    editor.executeEdits('astral-update', [{
      range: model.getFullModelRange(),
      text: t,
      forceMoveMarkers: true
    }]);
    editor.pushUndoStop();
  }
}
</script>
</body>
</html>
